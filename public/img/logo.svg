<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LC Performance">
  <defs>
    <linearGradient id="lcCyan" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#0086ba"/>
    </linearGradient>
    <linearGradient id="lcDark" x1="60" y1="6" x2="60" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12161f"/>
      <stop offset="1" stop-color="#07090d"/>
    </linearGradient>
  </defs>

  <!-- Escudo hexagonal -->
  <path d="M60 4 L106 28 V72 C106 90 86 104 60 116 C34 104 14 90 14 72 V28 Z"
        fill="url(#lcDark)" stroke="url(#lcCyan)" stroke-width="3"/>

  <!-- Arco de tacómetro -->
  <path d="M32 64 A28 28 0 0 1 88 64" fill="none" stroke="#1e2530" stroke-width="6" stroke-linecap="round"/>
  <path d="M32 64 A28 28 0 0 1 70 38" fill="none" stroke="url(#lcCyan)" stroke-width="6" stroke-linecap="round"/>

  <!-- Monograma LC -->
  <text x="60" y="74" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="34" font-weight="800" fill="#f1f5f9" letter-spacing="-1">LC</text>

  <!-- Líneas de velocidad -->
  <g stroke="url(#lcCyan)" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <line x1="40" y1="90" x2="58" y2="90"/>
    <line x1="46" y1="98" x2="64" y2="98"/>
    <line x1="62" y1="90" x2="80" y2="90"/>
  </g>
</svg>
